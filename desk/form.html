<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
  #drop {
    border: 2px dashed #999; border-radius: 8px; padding: 40px;
    text-align: center; cursor: pointer; color: #666;
    transition: background .15s, border-color .15s;
  }
  #drop.over { border-color: #333; background: #f0f0f0; color: #333; }
  #drop.has-file { border-style: solid; border-color: #2a7; color: #2a7; }
  .row { display: flex; gap: 8px; margin-top: 16px; align-items: center; }
  input[type=text] { flex: 1; padding: 8px; font: inherit; }
  button { padding: 8px 14px; font: inherit; cursor: pointer; }
  #send { width: 100%; margin-top: 8px; padding: 10px; }
  #status { margin-top: 12px; color: #666; font-size: 14px; min-height: 1em; word-break: break-all; }
  #status a { color: #2a7; }
  label.pub { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
</style>
</head>
<body>

<form id="f">
  <div id="drop">Click, drop, or paste (Ctrl-V) a file here</div>

  <div class="row">
    <input type="text" id="name" placeholder="filename" autocomplete="off">
    <button type="button" id="rand" title="Generate random name">🎲</button>
  </div>

  <div class="row">
    <label class="pub"><input type="checkbox" id="public"> Public</label>
  </div>

  <button type="submit" id="send">Send</button>
  <div id="status"></div>

  <input type="file" id="file" hidden>
</form>

<script>
  
const PREFIX_PRIVATE = location.origin + '/_~_/=bucket=/cx/private/';
const PREFIX_PUBLIC  = location.origin + '/_~_/=bucket=/cx/public/';

const drop = document.getElementById('drop');
const file = document.getElementById('file');
const name = document.getElementById('name');
const status = document.getElementById('status');
const pub = document.getElementById('public');
const rand = document.getElementById('rand');
let current = null; // current File/Blob

// Names: lowercase letters, digits, hyphens; optional single dot + non-empty extension.
// Normalize: lowercase, collapse runs of invalid chars into one hyphen, trim hyphens.
function normalizeName(s) {
  if (!s) return '';
  s = s.toLowerCase();
  // Split on the LAST dot to preserve a single optional extension
  const i = s.lastIndexOf('.');
  let base, ext;
  if (i > 0 && i < s.length - 1) {
    base = s.slice(0, i);
    ext  = s.slice(i + 1);
  } else {
    base = s;
    ext  = '';
  }
  const clean = str => str.replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  base = clean(base);
  ext  = clean(ext);
  if (!base) base = 'file';
  return ext ? `${base}.${ext}` : base;
}

// Base32 (RFC 4648, lowercase). 128 bits → exactly 26 chars (no padding kept).
function base32lower(bytes) {
  const alpha = 'abcdefghijklmnopqrstuvwxyz234567';
  let bits = 0, value = 0, out = '';
  for (const b of bytes) {
    value = (value << 8) | b;
    bits += 8;
    while (bits >= 5) {
      bits -= 5;
      out += alpha[(value >> bits) & 31];
    }
  }
  if (bits > 0) out += alpha[(value << (5 - bits)) & 31];
  return out;
}

function randomName(ext) {
  const bytes = new Uint8Array(16); // 128 bits
  crypto.getRandomValues(bytes);
  const id = base32lower(bytes); // 26 chars, [a-z2-7]
  return ext ? `${id}.${ext}` : id;
}

function extFromMime(mime) {
  if (!mime) return 'bin';
  const map = { 'image/png': 'png', 'image/jpeg': 'jpg', 'image/gif': 'gif',
                'image/webp': 'webp', 'image/svg+xml': 'svg', 'text/plain': 'txt' };
  return map[mime] || mime.split('/')[1] || 'bin';
}

function setFile(f, fallbackName) {
  current = f;
  const raw = (f.name && f.name !== 'blob') ? f.name : fallbackName;
  name.value = normalizeName(raw);
  drop.textContent = `📄 ${name.value} (${f.size} bytes)`;
  drop.classList.add('has-file');
  rand.disabled = false;
}

// Normalize whatever the user types as soon as they leave the field
name.addEventListener('blur', () => { name.value = normalizeName(name.value); });

// 1. Click → open file picker
drop.addEventListener('click', () => file.click());
file.addEventListener('change', () => {
  if (file.files[0]) setFile(file.files[0], file.files[0].name);
});

// 2. Drag & drop
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('over');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0], e.dataTransfer.files[0].name);
});

// 3 & 4. Paste (Ctrl-V) — works for both images (no name) and files (with name)
window.addEventListener('paste', e => {
  const items = e.clipboardData.items;
  for (const item of items) {
    if (item.kind === 'file') {
      const f = item.getAsFile();
      const fallback = `pasted-${Date.now()}.${extFromMime(f.type)}`;
      setFile(f, fallback);
      e.preventDefault();
      return;
    }
  }
});

// Random name button — only works if a file is selected; preserves extension
rand.disabled = true;
rand.addEventListener('click', () => {
  if (!current) return;
  const normalized = normalizeName(name.value);
  const m = normalized.match(/\.([^.]+)$/);
  name.value = randomName(m ? m[1] : '');
});

// Submit — POST binary body, filename + public flag in headers
document.getElementById('f').addEventListener('submit', async e => {
  e.preventDefault();
  if (!current) { status.textContent = 'No file selected.'; return; }

  // Final normalization before send
  name.value = normalizeName(name.value);
  const fname = name.value;
  const isPublic = pub.checked;

  // Build the link to display
  const dot = fname.lastIndexOf('.');
  const ext = (dot > 0 && dot < fname.length - 1) ? fname.slice(dot + 1) : 'data';
  const base = (dot > 0) ? fname.slice(0, dot) : fname;
  const url = (isPublic ? PREFIX_PUBLIC : PREFIX_PRIVATE) + base + '/' + ext;

  status.innerHTML = 'Uploading… <a href="' + url + '">' + url + '</a>';

  try {
    const res = await fetch('upload', {
      method: 'POST',
      headers: {
        'Content-Type': current.type || 'application/octet-stream',
        'X-Filename': encodeURIComponent(fname),
        'X-Public': isPublic ? '1' : '0'
      },
      body: current
    });
    const mark = res.ok ? '✓' : `✗ ${res.status}`;
    status.innerHTML = mark + ' <a href="' + url + '">' + url + '</a>';
  } catch (err) {
    status.innerHTML = '✗ ' + err.message + ' <a href="' + url + '">' + url + '</a>';
  }
});
</script>

</body>
</html>
